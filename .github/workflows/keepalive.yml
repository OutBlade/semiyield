name: Keepalive

# Uses a real headless browser so it can detect the Streamlit sleep page
# and click "Yes, get this app back up!" automatically.
# Also commits a timestamp to the repo every run so GitHub never disables
# this workflow due to 60 days of repository inactivity.
on:
  schedule:
    - cron: "0 10 * * *"     # every day at 10:00 UTC
  workflow_dispatch:          # manual trigger from the Actions tab

jobs:
  wake:
    name: Wake Streamlit app
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Playwright + Chromium
        run: |
          pip install playwright
          playwright install chromium --with-deps

      - name: Wake app
        run: |
          python - <<'EOF'
          import asyncio
          from playwright.async_api import async_playwright

          APP_URL = "https://semiyield.streamlit.app"

          async def main():
              async with async_playwright() as p:
                  browser = await p.chromium.launch()
                  page = await browser.new_page()

                  print(f"Opening {APP_URL} ...")
                  await page.goto(APP_URL, timeout=60_000)

                  # Detect the sleep page by looking for the wake button.
                  try:
                      btn = await page.wait_for_selector(
                          "text=Yes, get this app back up!",
                          timeout=6_000,
                      )
                      print("App is sleeping — clicking wake button ...")
                      await btn.click()
                      # Wait up to 3 min for the app to fully start.
                      await page.wait_for_selector(
                          "[data-testid='stApp']",
                          timeout=180_000,
                      )
                      print("App woken and loaded successfully.")
                  except Exception:
                      print("App was already awake.")

                  await browser.close()

          asyncio.run(main())
          EOF

      - name: Commit timestamp to keep workflow active
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          date -u > .github/keepalive-last-run
          git add .github/keepalive-last-run
          git commit -m "chore: keepalive $(date -u '+%Y-%m-%d')" || echo "Nothing to commit"
          git push
