name: Keepalive

# Pings semiyield.streamlit.app every 4 days so Streamlit Community Cloud
# never reaches its 7-day inactivity sleep threshold.
on:
  schedule:
    - cron: "0 10 */4 * *"   # every 4 days at 10:00 UTC
  workflow_dispatch:          # allow manual trigger from the Actions tab

jobs:
  ping:
    name: Ping Streamlit app
    runs-on: ubuntu-latest
    steps:
      - name: Wake app
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 30 \
            --retry 3 \
            --retry-delay 10 \
            https://semiyield.streamlit.app)
          echo "HTTP status: $STATUS"
          # 200 = running, 503 = waking up — both are expected and fine
          if [ "$STATUS" -ne 200 ] && [ "$STATUS" -ne 503 ]; then
            echo "Unexpected status $STATUS" && exit 1
          fi
