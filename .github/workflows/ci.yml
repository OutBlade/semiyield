name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ---------------------------------------------------------------- #
  # Lint job: ruff and black                                          #
  # ---------------------------------------------------------------- #
  lint:
    name: Lint (ruff + black)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: lint-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: lint-pip-

      - name: Install linting tools
        run: pip install ruff black

      - name: Run ruff
        run: ruff check semiyield/ tests/ dashboard/

      - name: Run black check
        run: black --check semiyield/ tests/ dashboard/

  # ---------------------------------------------------------------- #
  # Test job: matrix on Python 3.10, 3.11, 3.12                      #
  # ---------------------------------------------------------------- #
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: test-pip-${{ matrix.python-version }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            test-pip-${{ matrix.python-version }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-timeout

      - name: Install package
        run: pip install -e .

      - name: Run tests
        run: |
          pytest tests/ \
            --cov=semiyield \
            --cov-report=xml \
            --cov-report=term-missing \
            -v \
            --timeout=120

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml
          flags: python-${{ matrix.python-version }}
          fail_ci_if_error: false

  # ---------------------------------------------------------------- #
  # Docker build job                                                   #
  # ---------------------------------------------------------------- #
  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker build -t semiyield:ci .

      - name: Verify image starts
        run: |
          docker run --rm -d \
            --name semiyield_ci_test \
            -p 8501:8501 \
            semiyield:ci
          sleep 10
          docker logs semiyield_ci_test 2>&1 | head -30
          docker stop semiyield_ci_test || true
